services:
  npc-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: npc-dedicated-server
    # Host networking: the server sees localhost as the host machine,
    # so it can reach LocalAI (8080, 11435), Qdrant (6333), and
    # PlayerAuthService (6000) directly, no extra config.
    network_mode: host
    environment:
      - SERVER_PORT=11474
      - SERVER_ADDRESS=0.0.0.0
    # Bind-mount the server build so you can iterate without rebuilding.
    # Disable (:ro = read-only) after you're happy and want an immutable image.
    volumes:
      - ../Builds/Server:/server:ro
    restart: unless-stopped
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
