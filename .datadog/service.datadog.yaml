# Service Catalog — NPC Platform
# See https://docs.datadoghq.com/service_catalog/
schema-version: v2
dd-service:
  - name: unity-dedicated-server
    display-name: Unity Dedicated Server
    description: "Unity Netcode for GameObjects dedicated server — hosts NPC dialogue sessions, player auth, and game state."
    team: npc-platform
    application: NPC System
    tags:
      - project:unity-linux-llm
      - tier:core
      - env:production
    links:
      - name: Repository
        type: repo
        url: https://github.com/twlgamesbr/Unity_Linux_LLM
      - name: AGENTS.md
        type: docs
        url: https://github.com/twlgamesbr/Unity_Linux_LLM/blob/main/AGENTS.md
    contacts:
      - name: "#npc-platform-slack"
        type: slack
        url: https://your-org.slack.com/archives/npc-platform

  - name: localai
    display-name: LocalAI
    description: "LocalAI LLM inference server — runs llama-3.1-8b, qwen2.5-1.5b, and embedding models for NPC dialogue generation."
    team: npc-platform
    application: NPC System
    tags:
      - project:unity-linux-llm
      - tier:core
      - env:production
    links:
      - name: Repository
        type: repo
        url: https://github.com/twlgamesbr/Unity_Linux_LLM
      - name: LocalAI Docs
        type: docs
        url: https://localai.io/
    contacts:
      - name: "#npc-platform-slack"
        type: slack
        url: https://your-org.slack.com/archives/npc-platform

  - name: localai-proxy
    display-name: LocalAI Proxy (Consolidated)
    description: "FastAPI proxy between Unity and LocalAI — single consolidated Datadog proxy for all LocalAI traffic. Chat completions get rich LLM Observability tracing (tokens, latency, prompt/response); every other LocalAI endpoint gets generic APM passthrough tracing. Absorbed the formerly separate localai-trace-proxy sidecar."
    team: npc-platform
    application: NPC System
    tags:
      - project:unity-linux-llm
      - tier:observability
      - env:production
    links:
      - name: Source
        type: repo
        url: https://github.com/twlgamesbr/Unity_Linux_LLM/blob/main/Backend/localai-proxy/main.py
    contacts:
      - name: "#npc-platform-slack"
        type: slack
        url: https://your-org.slack.com/archives/npc-platform

  - name: qdrant
    display-name: Qdrant Vector DB
    description: "Qdrant vector database — stores NPC knowledge embeddings and codebase embeddings for RAG-powered dialogue."
    team: npc-platform
