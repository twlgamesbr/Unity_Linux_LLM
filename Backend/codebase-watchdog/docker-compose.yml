services:
  codebase-watchdog:
    build:
      context: ../..
      dockerfile: Backend/codebase-watchdog/Dockerfile
    container_name: codebase-watchdog
    # Host networking: the watcher sees localhost as the host machine,
    # so it can reach Qdrant (localhost:6333) and LocalAI (localhost:8080)
    # directly, no extra config.
    network_mode: host
    environment:
      - QDRANT_URL=http://localhost:6333
      - COLLECTION_NAME=unity_linux_llm_codebase_v2
      - LOCALAI_BASE_URL=http://localhost:8080/v1
      - EMBEDDING_MODEL=nomic-embed-text-v1.5
      - PROJECT_SLUG=Unity_Linux_LLM
      - WATCH_DEBOUNCE_SECONDS=1.5
      # Datadog APM — traces sent to host-level dd-agent on :8126
      - DD_SERVICE=codebase-watchdog
      - DD_ENV=production
      - DD_SITE=us5.datadoghq.com
      - DD_AGENT_HOST=localhost
      - DD_TRACE_AGENT_PORT=8126
      - DD_LOGS_INJECTION=true
    # Bind-mount the project root so the watcher can read files and
    # maintain the .codebase-index/ artifact cache.
    volumes:
      - ../..:/workspace:rw
    restart: unless-stopped
    stop_grace_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────────
  # Monitoring: see Backend/datadog-host/docker-compose.yml
  # for the single host-level Datadog Agent that auto-discovers
  # all containers, including this codebase watchdog.
  # ─────────────────────────────────────────────────
