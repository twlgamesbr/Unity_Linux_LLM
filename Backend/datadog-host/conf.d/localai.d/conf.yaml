## LocalAI LLM inference server monitoring.
## Collects metrics from LocalAI's /metrics endpoint for GPU utilization,
## request latency, token generation rates, and model loading status.
init_config:

instances:
  - openmetrics_endpoint: http://localhost:8080/metrics
    tags:
      - service:localai
      - team:npc-platform
      - env:${DD_ENV:-production}
    metrics:
      ## LLM inference metrics
      - llm_inference_requests_total: llm.inference.requests.total
      - llm_inference_tokens_total: llm.inference.tokens.total
      - llm_inference_duration_ms: llm.inference.duration.ms
      - llm_inference_tokens_per_second: llm.inference.tokens_per_second
      ## GPU utilization
      - process_gpu_compute_utilization: process.gpu.compute.utilization
      - process_gpu_memory_utilization: process.gpu.memory.utilization
      ## Backend/model status
      - llm_backend_loaded_models: llm.backend.loaded_models
      - llm_backend_queue_size: llm.backend.queue.size
      ## System
      - process_resident_memory_bytes: process.memory.resident.bytes

logs:
  - type: docker
    source: localai
    service: localai
    sourcecategory: llm_inference
    log_processing_rules:
      - type: multi_line
        name: new_log_start_with_timestamp
        pattern: \d{4}-\d{2}-\d{2}\s+\d{2}:\d{2}:\d{2}
