## Supabase Stack monitoring.
## Simplified to use Docker log collection only (no Supabase SDK check dependency).
## The Datadog Agent's built-in supabase check requires specific API endpoints
## that we don't expose — so we use generic Docker log collection instead.
init_config:

instances:
  ## Logs-only configuration for Supabase services
  - min_collection_interval: 60
    tags:
      - service:supabase
      - team:npc-platform
      - env:production

logs:
  - type: docker
    source: gotrue
    service: supabase-auth
    sourcecategory: auth_server

  - type: docker
    source: postgrest
    service: supabase-rest
    sourcecategory: api

  - type: docker
    source: supabase-realtime
    service: supabase-realtime
    sourcecategory: websocket

  - type: docker
    source: postgresql
    service: supabase-db
    sourcecategory: database
