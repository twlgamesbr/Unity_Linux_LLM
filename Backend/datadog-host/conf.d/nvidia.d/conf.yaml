# Datadog NVIDIA SMI Integration
# Collects host-level GPU metrics: utilization, memory, temperature, power
# These feed the dashboard's "GPU Utilization (NVIDIA)" widget
#
# Reference: https://docs.datadoghq.com/integrations/nvidia/
init_config:

instances:
  - min_collection_interval: 15
    # Collect from all GPUs
    gpu_index: "all"
    # Tags to identify this host's GPUs
    tags:
      - "env:production"
      - "project:unity-linux-llm"
      - "gpu_vendor:nvidia"
