name: supabase-stack

services:
  db:
    container_name: supabase-stack-db
    image: supabase/postgres:17.6.1.136
    restart: unless-stopped
    ports:
      - "${DB_HOST_PORT:-55432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      JWT_SECRET: ${JWT_SECRET:-dev-local-jwt-secret-dev-local-jwt-secret}
      JWT_EXP: ${JWT_EXPIRY:-3600}
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-postgres}", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth:
    container_name: supabase-stack-auth
    image: supabase/gotrue:v2.189.0
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${AUTH_HOST_PORT:-8091}:9999"
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL:-http://localhost:8091}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@db:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-postgres}
      GOTRUE_SITE_URL: ${SITE_URL:-http://localhost:3000}
      GOTRUE_URI_ALLOW_LIST: ${ADDITIONAL_REDIRECT_URLS:-http://localhost:3000,http://127.0.0.1:3000}
      GOTRUE_DISABLE_SIGNUP: "${DISABLE_SIGNUP:-false}"
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: ${JWT_EXPIRY:-3600}
      GOTRUE_JWT_SECRET: ${JWT_SECRET:-dev-local-jwt-secret-dev-local-jwt-secret}
      GOTRUE_JWT_ISSUER: ${API_EXTERNAL_URL:-http://localhost:8091}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "${ENABLE_EMAIL_SIGNUP:-true}"
      GOTRUE_EXTERNAL_ANONYMOUS_USERS_ENABLED: "${ENABLE_ANONYMOUS_USERS:-false}"
      GOTRUE_MAILER_AUTOCONFIRM: "${ENABLE_EMAIL_AUTOCONFIRM:-true}"
      GOTRUE_SMTP_ADMIN_EMAIL: ${SMTP_ADMIN_EMAIL:-devnull@example.com}
      GOTRUE_SMTP_HOST: ${SMTP_HOST:-localhost}
      GOTRUE_SMTP_PORT: ${SMTP_PORT:-1025}
      GOTRUE_SMTP_USER: ${SMTP_USER:-}
      GOTRUE_SMTP_PASS: ${SMTP_PASS:-}
      GOTRUE_SMTP_SENDER_NAME: ${SMTP_SENDER_NAME:-Supabase Local}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9999/health"]
      interval: 5s
      timeout: 5s
      retries: 3

  rest:
    container_name: supabase-stack-rest
    image: postgrest/postgrest:v14.12
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${REST_HOST_PORT:-8092}:3000"
    environment:
      PGRST_DB_URI: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@db:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-postgres}
      PGRST_DB_SCHEMAS: ${PGRST_DB_SCHEMAS:-public}
      PGRST_DB_MAX_ROWS: ${PGRST_DB_MAX_ROWS:-1000}
      PGRST_DB_EXTRA_SEARCH_PATH: ${PGRST_DB_EXTRA_SEARCH_PATH:-public}
      PGRST_DB_ANON_ROLE: anon
      PGRST_ADMIN_SERVER_PORT: 3001
      PGRST_ADMIN_SERVER_HOST: localhost
      PGRST_JWT_SECRET: ${JWT_SECRET:-dev-local-jwt-secret-dev-local-jwt-secret}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET:-dev-local-jwt-secret-dev-local-jwt-secret}
      PGRST_APP_SETTINGS_JWT_EXP: ${JWT_EXPIRY:-3600}
    command: ["postgrest"]
    healthcheck:
      test: ["CMD", "postgrest", "--ready"]
      interval: 5s
      timeout: 5s
      retries: 3

  realtime:
    container_name: realtime-dev.supabase-realtime
    image: supabase/realtime:v2.102.3
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${REALTIME_HOST_PORT:-8093}:4000"
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: ${POSTGRES_PORT:-5432}
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: ${POSTGRES_DB:-postgres}
      DB_AFTER_CONNECT_QUERY: SET search_path TO _realtime
      DB_ENC_KEY: ${REALTIME_DB_ENC_KEY:-supabaserealtime}
      API_JWT_SECRET: ${JWT_SECRET:-dev-local-jwt-secret-dev-local-jwt-secret}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-dev-local-secret-key-base}
      METRICS_JWT_SECRET: ${JWT_SECRET:-dev-local-jwt-secret-dev-local-jwt-secret}
      ERL_AFLAGS: -proto_dist inet_tcp
      DNS_NODES: "''"
      RLIMIT_NOFILE: "10000"
      APP_NAME: realtime
      SEED_SELF_HOST: "true"
      RUN_JANITOR: "true"
      DISABLE_HEALTHCHECK_LOGGING: "true"
    healthcheck:
      test: ["CMD-SHELL", "curl -sSfL --head -o /dev/null http://localhost:4000/api/tenants/realtime-dev/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  imgproxy:
    container_name: supabase-stack-imgproxy
    image: darthsim/imgproxy:v3.30.1
    restart: unless-stopped
    ports:
      - "${IMGPROXY_HOST_PORT:-8095}:5001"
    environment:
      IMGPROXY_BIND: :5001
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: /
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_AUTO_WEBP: "true"
      IMGPROXY_MAX_SRC_RESOLUTION: 16.8

  storage:
    container_name: supabase-stack-storage
    image: supabase/storage-api:v1.60.4
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      rest:
        condition: service_started
      imgproxy:
        condition: service_started
    ports:
      - "${STORAGE_HOST_PORT:-8094}:5000"
    environment:
      ANON_KEY: ${ANON_KEY:-dev-local-anon-key}
      SERVICE_KEY: ${SERVICE_ROLE_KEY:-dev-local-service-role-key}
      POSTGREST_URL: http://rest:3000
      AUTH_JWT_SECRET: ${JWT_SECRET:-dev-local-jwt-secret-dev-local-jwt-secret}
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@db:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-postgres}
      STORAGE_PUBLIC_URL: ${SUPABASE_PUBLIC_URL:-http://localhost:8091}
      REQUEST_ALLOW_X_FORWARDED_PATH: "true"
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      GLOBAL_S3_BUCKET: ${GLOBAL_S3_BUCKET:-storage}
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: ${STORAGE_TENANT_ID:-stub}
      REGION: ${REGION:-local}
      ENABLE_IMAGE_TRANSFORMATION: "true"
      IMGPROXY_URL: http://imgproxy:5001
    volumes:
      - storage-data:/var/lib/storage
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://storage:5000/status"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 10s

  meta:
    container_name: supabase-stack-meta
    image: supabase/postgres-meta:v0.96.6
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${META_HOST_PORT:-8096}:8080"
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: db
      PG_META_DB_PORT: ${POSTGRES_PORT:-5432}
      PG_META_DB_NAME: ${POSTGRES_DB:-postgres}
      PG_META_DB_USER: postgres
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      CRYPTO_KEY: ${PG_META_CRYPTO_KEY:-dev-local-pg-meta-crypto-key}

  functions:
    container_name: supabase-stack-functions
    image: supabase/edge-runtime:v1.72.0
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${FUNCTIONS_HOST_PORT:-8098}:9000"
    environment:
      EDGE_RUNTIME_PORT: 9000
      EDGE_RUNTIME_MAIN_SERVICE: /app/functions/main
      EDGE_RUNTIME_DENO_DIR: /app/.deno
      JWT_SECRET: ${JWT_SECRET:-dev-local-jwt-secret-dev-local-jwt-secret}
      SUPABASE_URL: http://auth:9999
      SUPABASE_ANON_KEY: ${ANON_KEY:-dev-local-anon-key}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY:-dev-local-service-role-key}
      PG_DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@db:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-postgres}
    volumes:
      - ./supabase/functions:/app/functions:ro
      - functions-deno-cache:/app/.deno
    healthcheck:
      test: ["CMD", "curl", "-sSfL", "-o", "/dev/null", "http://localhost:9000/"]
      interval: 10s
      timeout: 5s
      retries: 3

  studio:
    container_name: supabase-stack-studio
    image: supabase/studio:2026.07.07-sha-a6a04f2
    restart: unless-stopped
    depends_on:
      meta:
        condition: service_started
    ports:
      - "${STUDIO_HOST_PORT:-8097}:3000"
    environment:
      HOSTNAME: 0.0.0.0
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_HOST: db
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_USER_READ_WRITE: postgres
      PG_META_CRYPTO_KEY: ${PG_META_CRYPTO_KEY:-dev-local-pg-meta-crypto-key}
      PGRST_DB_SCHEMAS: ${PGRST_DB_SCHEMAS:-public}
      PGRST_DB_MAX_ROWS: ${PGRST_DB_MAX_ROWS:-1000}
      PGRST_DB_EXTRA_SEARCH_PATH: ${PGRST_DB_EXTRA_SEARCH_PATH:-public}
      DEFAULT_ORGANIZATION_NAME: ${STUDIO_DEFAULT_ORGANIZATION:-Local}
      DEFAULT_PROJECT_NAME: ${STUDIO_DEFAULT_PROJECT:-Unity}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      SUPABASE_URL: ${SUPABASE_URL:-http://localhost:8091}
      SUPABASE_PUBLIC_URL: ${SUPABASE_PUBLIC_URL:-http://localhost:8091}
      SUPABASE_ANON_KEY: ${ANON_KEY:-dev-local-anon-key}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY:-dev-local-service-role-key}
      AUTH_JWT_SECRET: ${JWT_SECRET:-dev-local-jwt-secret-dev-local-jwt-secret}
      SUPABASE_PUBLISHABLE_KEY: ${SUPABASE_PUBLISHABLE_KEY:-}
      SUPABASE_SECRET_KEY: ${SUPABASE_SECRET_KEY:-}
      ENABLED_FEATURES_LOGS_ALL: "false"
      SNIPPETS_MANAGEMENT_FOLDER: /app/snippets
      EDGE_FUNCTIONS_MANAGEMENT_FOLDER: /app/edge-functions
    volumes:
      - studio-snippets:/app/snippets
      - studio-functions:/app/edge-functions:ro

volumes:
  db-data:
  storage-data:
  functions-deno-cache:
  studio-snippets:
  studio-functions:
