services:
  npc-server:
    build:
      context: ../..
      dockerfile: Backend/unity-dedicated-server/Dockerfile
    container_name: npc-dedicated-server
    # Host networking: the server sees localhost as the host machine,
    # so it can reach LocalAI (8080), Qdrant (6333), and
    # PlayerAuthService (6000) directly, no extra config.
    network_mode: host
    environment:
      - SERVER_PORT=11474
      - SERVER_ADDRESS=0.0.0.0
      - USE_WEBSOCKETS=true
      - DD_SERVICE=npc-server
      - DD_ENV=${DD_ENV:-production}
      - DD_SITE=${DD_SITE:-us5.datadoghq.com}
      - DD_PROFILING_ENABLED=auto
      - DD_DATA_STREAMS_ENABLED=true
      - DD_AGENT_HOST=dd-agent
      - DD_TRACE_AGENT_PORT=8126
    # Bind-mount the server build so you can iterate without rebuilding.
    # Read-write: Unity needs to write to _Data/ for logs and config.
    volumes:
      - ../../Builds/Server1:/server:rw
    restart: unless-stopped
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ─────────────────────────────────────────────────
  # Monitoring: see Backend/datadog-host/docker-compose.yml
  # for the single host-level Datadog Agent that auto-discovers
  # all containers, including this Unity dedicated server.
  # Custom DogStatsD metrics are emitted directly by the Unity
  # server via UDP port 8125 to the host-level dd-agent.
  # ─────────────────────────────────────────────────
