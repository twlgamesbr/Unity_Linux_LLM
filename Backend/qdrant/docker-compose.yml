services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"   # gRPC + REST API
      - "6334:6334"   # Internal cluster (single-node, unused but harmless)
    volumes:
      # Persist storage so collections survive container restarts
      - /mnt/data/Projects_SSD/qdrant_storage:/qdrant/storage:rw
      - ./config.yaml:/qdrant/config/production.yaml:ro
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__SERVICE__HTTP_PORT=6333
      - DD_SERVICE=qdrant
      - DD_ENV=${DD_ENV:-production}
      - DD_API_KEY=${DD_API_KEY:-}
      - DD_SITE=${DD_SITE:-us5.datadoghq.com}
      - DD_AGENT_HOST=dd-agent
      - DD_TRACE_AGENT_PORT=8126
    restart: unless-stopped
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────────
  # Monitoring: see Backend/datadog-host/docker-compose.yml
  # for the single host-level Datadog Agent that auto-discovers
  # all containers, including this Qdrant stack.
  # Qdrant metrics are collected via OpenMetrics from port 6333.
  # ─────────────────────────────────────────────────
