events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    types {
        application/octet-stream data;
        application/wasm       wasm;
        application/javascript js;
    }

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log main;
    error_log   /var/log/nginx/error.log warn;

    sendfile              on;
    keepalive_timeout     65;

    # Cache control: index.html never cached, everything else 1d
    map $uri $cache_control {
        ~^/(index\.html)?$ "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        default "public, max-age=86400, no-transform";
    }

    server {
        listen       80;
        listen  [::]:80;
        server_name  localhost;
        root         /usr/share/nginx/html;
        index        index.html index.htm;

        # ── COOP/COEP for threaded WebGL (SharedArrayBuffer) ────────
        # NOTE: add_header in a location block OVERRIDES all inherited
        # server-level add_header directives, so every location block
        # that uses add_header must also repeat the COOP/COEP headers.
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;

        # ── index.html (never cache) ──────────────────────────────────
        location = / {
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
            add_header Cross-Origin-Resource-Policy "same-origin" always;
            add_header Cache-Control $cache_control;
            # Inject Datadog Browser RUM SDK into index.html
            sub_filter '</head>' '<script src="/datadog-rum-init.js" defer></script></head>';
            sub_filter_once on;
            sub_filter_types text/html;
            try_files /index.html =404;
        }
        location = /index.html {
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
            add_header Cross-Origin-Resource-Policy "same-origin" always;
            add_header Cache-Control $cache_control;
            # Inject Datadog Browser RUM SDK into index.html
            sub_filter '</head>' '<script src="/datadog-rum-init.js" defer></script></head>';
            sub_filter_once on;
            sub_filter_types text/html;
        }

        # ── DataDog intake proxy (avoids CORS) ─────────────────────────
        # Forwards /dd-intake requests to the Python ddproxy sidecar
        # which handles the ddforward protocol and proxies to DataDog intake.
        # Site: us5.datadoghq.com
        location /dd-intake {
            proxy_pass http://host.docker.internal:9090;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
            client_max_body_size 1m;
        }

        # ── NGINX status (Datadog agent) ─────────────────────────────
        location /nginx_status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow 172.0.0.0/8;
            deny all;
        }

        # ── Static assets (css, images, etc.) ────────────────────────
        location ~* \.(css|png|jpg|jpeg|gif|ico|svg)$ {
            add_header Cross-Origin-Resource-Policy "cross-origin" always;
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0, no-transform";
        }

        # ── WebSocket proxy to Unity Dedicated Server ────────────────
        location /ws {
            proxy_pass http://host.docker.internal:11474;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ── Supabase Gotrue Auth proxy ───────────────────────────────
        location /auth/ {
            proxy_pass http://host.docker.internal:8091/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Client-Info, apikey" always;
            if ($request_method = OPTIONS) { return 204; }
        }

        # ── Supabase PostgREST proxy ─────────────────────────────────
        location /rest/ {
            proxy_pass http://host.docker.internal:8092/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Client-Info, apikey, Prefer" always;
            if ($request_method = OPTIONS) { return 204; }
        }

        # ── WebGL build assets ───────────────────────────────────────
        # Uncompressed, gzip, brotli — all served with correct MIME and COOP.
        location ~* \.framework\.js$ {
            default_type application/javascript;
            expires off;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
            add_header Cross-Origin-Resource-Policy "cross-origin" always;
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0, no-transform";
            add_header Access-Control-Allow-Origin "*" always;
        }

        location /Build/ {
            gzip_static on;
            types {
                application/octet-stream data;
                application/javascript js;
                application/wasm    wasm;
            }
            expires off;
            add_header Cross-Origin-Resource-Policy "cross-origin" always;
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0, no-transform";
            add_header Access-Control-Allow-Origin "*" always;

            # Pre-compressed Brotli (.br)
            location ~ \.br$ {
                gzip off;
                set $br_type application/octet-stream;
                if ($uri ~ \.wasm\.br$)  { set $br_type application/wasm; }
                if ($uri ~ \.js\.br$)    { set $br_type application/javascript; }
                if ($uri ~ \.data\.br$)  { set $br_type application/octet-stream; }
                default_type $br_type;
                add_header Cross-Origin-Resource-Policy "cross-origin" always;
                add_header Content-Encoding br;
            }

            # Pre-compressed Gzip (.gz)
            location ~ \.gz$ {
                gzip off;
                set $gz_type application/octet-stream;
                if ($uri ~ \.wasm\.gz$) { set $gz_type application/wasm; }
                if ($uri ~ \.js\.gz$)   { set $gz_type application/javascript; }
                if ($uri ~ \.data\.gz$) { set $gz_type application/octet-stream; }
                default_type $gz_type;
                add_header Cross-Origin-Resource-Policy "cross-origin" always;
                add_header Content-Encoding gzip;
            }

            # UnityWeb compressed bundle (.unityweb) — legacy Brotli
            location ~ \.unityweb$ {
                gzip off;
                set $uw_type application/octet-stream;
                if ($uri ~ \.wasm\.unityweb$)   { set $uw_type application/wasm; }
                if ($uri ~ \.js\.unityweb$)     { set $uw_type application/javascript; }
                if ($uri ~ \.data\.unityweb$)   { set $uw_type application/octet-stream; }
                default_type $uw_type;
                add_header Cross-Origin-Resource-Policy "cross-origin" always;
                add_header Content-Encoding br;
            }
        }

        # ── Uncompressed wasm/data outside /Build/ ───────────────────
        location ~* \.(wasm|data)$ {
            expires off;
            add_header Cross-Origin-Resource-Policy "cross-origin" always;
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0, no-transform";
            add_header Access-Control-Allow-Origin "*" always;
        }

        # ── LocalAI API proxy ────────────────────────────────────────
        location /v1/ {
            proxy_pass http://host.docker.internal:8080/v1/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
            if ($request_method = OPTIONS) { return 204; }
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html { root /usr/share/nginx/html; }
    }
}
