services:
  npc-server:
    build:
      context: ../..
      dockerfile: Backend/webgl-client/Dockerfile
    container_name: npc-dedicated-server
    # Host networking: the server sees localhost as the host machine,
    # so it can reach LocalAI (8080, 11435), Qdrant (6333), and
    # PlayerAuthService (6000) directly, no extra config.
    network_mode: host
    environment:
      - SERVER_PORT=11474
      - SERVER_ADDRESS=0.0.0.0
      - USE_WEBSOCKETS=true
    # Bind-mount the server build so you can iterate without rebuilding.
    # Read-write: Unity needs to write to _Data/ for logs and config.
    volumes:
      - ../../Builds/Server:/server
    restart: unless-stopped
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  npc-webgl-client:
    image: nginx:alpine
    container_name: npc-webgl-client
    ports:
      - "8085:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../../Builds/WebGL_client/WebGL:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────────
  # Datadog Agent — collects logs, metrics, APM traces,
  # and Nginx access logs from the WebGL client stack.
  # Requires DD_API_KEY set in Backend/.env
  # ─────────────────────────────────────────────────
  datadog-agent:
    container_name: datadog-agent-webgl
    image: gcr.io/datadoghq/agent:latest
    pid: host
    network_mode: host
    environment:
      - DD_API_KEY=${DD_API_KEY:?err}
      - DD_SITE=${DD_SITE:-datadoghq.com}
      - DD_TAGS=project:unity-linux-llm env:production service:webgl-client
      - DD_APM_ENABLED=true
      - DD_APM_NON_LOCAL_TRAFFIC=true
      - DD_LOGS_ENABLED=true
      - DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL=true
      - DD_PROCESS_AGENT_ENABLED=true
      - DD_DOGSTATSD_NON_LOCAL_TRAFFIC=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro
    restart: unless-stopped
