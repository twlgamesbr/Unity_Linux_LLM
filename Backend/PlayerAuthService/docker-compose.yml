services:
  postgres-auth:
    image: postgres:16
    container_name: unity-linux-llm-auth-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: unity_linux_llm_auth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - player_auth_postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d unity_linux_llm_auth"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:latest
    container_name: unity-linux-llm-adminer
    restart: unless-stopped
    ports:
      - "8082:8080"
    depends_on:
      postgres-auth:
        condition: service_healthy

  postgrest:
    image: postgrest/postgrest:latest
    container_name: unity-linux-llm-postgrest
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      PGRST_DB_URI: postgres://authenticator:postgrest@postgres-auth:5432/unity_linux_llm_auth
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: web_anon
      PGRST_OPENAPI_SERVER_PROXY_URI: http://localhost:3001
    depends_on:
      postgres-auth:
        condition: service_healthy

volumes:
  player_auth_postgres_data:
