events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Ensure .data is explicitly mapped to avoid download/execution issues in browser.
    # .wasm and .js are already configured in /etc/nginx/mime.types.
    types {
        application/octet-stream              data;
    }

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;
    error_log   /var/log/nginx/error.log   warn;

    sendfile        on;
    keepalive_timeout  65;

    # Enable dynamic gzip compression for HTML, CSS, JS, JSON (excludes large binary .wasm and .data on-the-fly)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss;

    server {
        listen       80;
        listen  [::]:80;
        server_name  localhost;

        root   /usr/share/nginx/html;
        index  index.html index.htm;

        # Disable caching for index.html (both / and /index.html) so revisions load instantly
        location = / {
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            add_header Cross-Origin-Opener-Policy "same-origin";
            add_header Cross-Origin-Embedder-Policy "require-corp";
            try_files /index.html =404;
        }

        location = /index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            add_header Cross-Origin-Opener-Policy "same-origin";
            add_header Cross-Origin-Embedder-Policy "require-corp";
        }

        # Cache regular static framework/loader and style assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
            expires 1d;
            add_header Cache-Control "public, no-transform";
            add_header Cross-Origin-Opener-Policy "same-origin";
            add_header Cross-Origin-Embedder-Policy "require-corp";
        }

        # Reverse Proxy for WebSockets to Unity Dedicated Server
        # Allows client to connect to ws://localhost:8085/ws, routing natively to the dedicated server.
        location /ws {
            proxy_pass http://host.docker.internal:11474;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Serve WebGL assets under /Build/ with compression, correct types, and security headers
        location ^~ /Build/ {
            gzip_static on;
            types {
                application/octet-stream data;
                application/javascript js;
                application/wasm wasm;
            }
            expires 7d;
            add_header Cache-Control "public, no-transform";
            add_header Access-Control-Allow-Origin "*";
            add_header Cross-Origin-Opener-Policy "same-origin";
            add_header Cross-Origin-Embedder-Policy "require-corp";

            # Direct requests for .wasm.br files under /Build/
            location ~ \.wasm\.br$ {
                gzip off;
                add_header Content-Encoding br;
                add_header Cache-Control "public, no-transform";
                add_header Access-Control-Allow-Origin "*";
                add_header Cross-Origin-Opener-Policy "same-origin";
                add_header Cross-Origin-Embedder-Policy "require-corp";
                default_type application/wasm;
            }

            # Direct requests for .data.br files under /Build/
            location ~ \.data\.br$ {
                gzip off;
                add_header Content-Encoding br;
                add_header Cache-Control "public, no-transform";
                add_header Access-Control-Allow-Origin "*";
                add_header Cross-Origin-Opener-Policy "same-origin";
                add_header Cross-Origin-Embedder-Policy "require-corp";
                default_type application/octet-stream;
            }

            # Direct requests for .js.br files under /Build/
            location ~ \.js\.br$ {
                gzip off;
                add_header Content-Encoding br;
                add_header Cache-Control "public, no-transform";
                add_header Access-Control-Allow-Origin "*";
                add_header Cross-Origin-Opener-Policy "same-origin";
                add_header Cross-Origin-Embedder-Policy "require-corp";
                default_type application/javascript;
            }

            # Direct requests for .wasm.gz files under /Build/
            location ~ \.wasm\.gz$ {
                gzip off;
                add_header Content-Encoding gzip;
                add_header Cache-Control "public, no-transform";
                add_header Access-Control-Allow-Origin "*";
                add_header Cross-Origin-Opener-Policy "same-origin";
                add_header Cross-Origin-Embedder-Policy "require-corp";
                default_type application/wasm;
            }

            # Direct requests for .data.gz files under /Build/
            location ~ \.data\.gz$ {
                gzip off;
                add_header Content-Encoding gzip;
                add_header Cache-Control "public, no-transform";
                add_header Access-Control-Allow-Origin "*";
                add_header Cross-Origin-Opener-Policy "same-origin";
                add_header Cross-Origin-Embedder-Policy "require-corp";
                default_type application/octet-stream;
            }

            # Direct requests for .js.gz files under /Build/
            location ~ \.js\.gz$ {
                gzip off;
                add_header Content-Encoding gzip;
                add_header Cache-Control "public, no-transform";
                add_header Access-Control-Allow-Origin "*";
                add_header Cross-Origin-Opener-Policy "same-origin";
                add_header Cross-Origin-Embedder-Policy "require-corp";
                default_type application/javascript;
            }
        }

        # Cache and correctly serve large uncompressed wasm/data assets with CORS & Multithreading Headers
        location ~* \.(wasm|data)$ {
            expires 7d;
            add_header Cache-Control "public, no-transform";
            add_header Access-Control-Allow-Origin "*";
            add_header Cross-Origin-Opener-Policy "same-origin";
            add_header Cross-Origin-Embedder-Policy "require-corp";
        }

        # Serve pre-compressed Brotli unityweb files (.unityweb) with browser Content-Encoding header
        # Since WebGL Decompression Fallback is disabled, the browser must decompress them natively.
        location ~ .+\.data\.unityweb$ {
            gzip off;
            add_header Content-Encoding br;
            add_header Cache-Control "public, no-transform";
            add_header Access-Control-Allow-Origin "*";
            add_header Cross-Origin-Opener-Policy "same-origin";
            add_header Cross-Origin-Embedder-Policy "require-corp";
            default_type application/octet-stream;
        }

        location ~ .+\.framework\.js\.unityweb$ {
            gzip off;
            add_header Content-Encoding br;
            add_header Cache-Control "public, no-transform";
            add_header Access-Control-Allow-Origin "*";
            add_header Cross-Origin-Opener-Policy "same-origin";
            add_header Cross-Origin-Embedder-Policy "require-corp";
            default_type application/javascript;
        }

        location ~ .+\.wasm\.unityweb$ {
            gzip off;
            add_header Content-Encoding br;
            add_header Cache-Control "public, no-transform";
            add_header Access-Control-Allow-Origin "*";
            add_header Cross-Origin-Opener-Policy "same-origin";
            add_header Cross-Origin-Embedder-Policy "require-corp";
            default_type application/wasm;
        }

        # Serve pre-compressed Brotli files (.br)
        location ~ .+\.(data|symbols\.json)\.br$ {
            gzip off;
            add_header Content-Encoding br;
            add_header Cache-Control "public, no-transform";
            add_header Access-Control-Allow-Origin "*";
            add_header Cross-Origin-Opener-Policy "same-origin";
            add_header Cross-Origin-Embedder-Policy "require-corp";
            default_type application/octet-stream;
        }

        location ~ .+\.js\.br$ {
            gzip off;
            add_header Content-Encoding br;
            add_header Cache-Control "public, no-transform";
            add_header Access-Control-Allow-Origin "*";
            add_header Cross-Origin-Opener-Policy "same-origin";
            add_header Cross-Origin-Embedder-Policy "require-corp";
            default_type application/javascript;
        }

        location ~ .+\.wasm\.br$ {
            gzip off;
            add_header Content-Encoding br;
            add_header Cache-Control "public, no-transform";
            add_header Access-Control-Allow-Origin "*";
            add_header Cross-Origin-Opener-Policy "same-origin";
            add_header Cross-Origin-Embedder-Policy "require-corp";
            default_type application/wasm;
        }

        # Serve pre-compressed Gzip files (.gz)
        location ~ .+\.(data|symbols\.json)\.gz$ {
            gzip off;
            add_header Content-Encoding gzip;
            add_header Cache-Control "public, no-transform";
            add_header Access-Control-Allow-Origin "*";
            add_header Cross-Origin-Opener-Policy "same-origin";
            add_header Cross-Origin-Embedder-Policy "require-corp";
            default_type application/gzip;
        }

        location ~ .+\.js\.gz$ {
            gzip off;
            add_header Content-Encoding gzip;
            add_header Cache-Control "public, no-transform";
            add_header Access-Control-Allow-Origin "*";
            add_header Cross-Origin-Opener-Policy "same-origin";
            add_header Cross-Origin-Embedder-Policy "require-corp";
            default_type application/javascript;
        }

        location ~ .+\.wasm\.gz$ {
            gzip off;
            add_header Content-Encoding gzip;
            add_header Cache-Control "public, no-transform";
            add_header Access-Control-Allow-Origin "*";
            add_header Cross-Origin-Opener-Policy "same-origin";
            add_header Cross-Origin-Embedder-Policy "require-corp";
            default_type application/wasm;
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
}
